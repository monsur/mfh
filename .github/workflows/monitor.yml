name: URL Attribute Monitor

on:
  # Run every 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check-url:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run URL checker
        id: checker
        run: |
          OUTPUT=$(python check_url.py 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          exit $EXIT_CODE
        continue-on-error: true

      - name: Send email notification
        if: steps.checker.outcome == 'success'
        run: |
          # Build email body
          EMAIL_BODY="Great news! Reservations are available at Mamas Fish House!

          Book now: https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn

          This check ran at: ${{ github.event.repository.updated_at }}

          Check details:
          ${{ steps.checker.outputs.output }}

          Don't wait - popular slots fill up fast!"

          # Escape for JSON (replace newlines, quotes, backslashes)
          EMAIL_BODY_JSON=$(echo "$EMAIL_BODY" | jq -Rs .)

          # Send email via SendGrid API and capture response
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer ${{ secrets.SENDGRID_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"personalizations\": [{
                \"to\": [{\"email\": \"${{ secrets.NOTIFICATION_EMAIL }}\"}]
              }],
              \"from\": {\"email\": \"${{ secrets.SENDGRID_FROM_EMAIL }}\"},
              \"subject\": \"🎉 Mamas Fish House - Reservations Available!\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": $EMAIL_BODY_JSON
              }]
            }")

          # Extract HTTP status code and response body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n-1)

          # Check if successful (202 is SendGrid's success code)
          if [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Email sent successfully!"
          else
            echo "❌ Failed to send email. HTTP Code: $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi
