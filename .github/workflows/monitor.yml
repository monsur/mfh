name: URL Attribute Monitor

on:
  # Run every 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check-url:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run URL checker
        id: checker
        run: |
          OUTPUT=$(python check_url.py 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          exit $EXIT_CODE
        continue-on-error: true

      - name: Send email notification
        if: steps.checker.outcome == 'success'
        uses: peter-evans/sendgrid-action@v1
        with:
          api-key: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SENDGRID_FROM_EMAIL }}
          subject: "🎉 Mamas Fish House - Reservations Available!"
          text: |
            Great news! Reservations are available at Mamas Fish House!

            Book now: https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn

            This check ran at: ${{ github.event.repository.updated_at }}

            Check details:
            ${{ steps.checker.outputs.output }}

            Don't wait - popular slots fill up fast!
