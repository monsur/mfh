name: URL Attribute Monitor

on:
  # Run every 15 minutes
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check-url:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run URL checker
        id: checker
        run: |
          python check_url.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Send email notification
        if: steps.checker.outcome == 'success'
        uses: peter-evans/sendgrid-action@v1
        with:
          api-key: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SENDGRID_FROM_EMAIL }}
          subject: '✓ Availability Found - Mamas Fish House'
          text: |
            Reservations are available!
            Check: https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn

      - name: Send SMS notification
        if: steps.checker.outcome == 'success'
        run: |
          python -c "
          from twilio.rest import Client
          import os
          client = Client(os.environ['TWILIO_ACCOUNT_SID'], os.environ['TWILIO_AUTH_TOKEN'])
          message = client.messages.create(
              body='🎉 Mama'\''s Fish House has availability! Book now: https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn',
              from_=os.environ['TWILIO_FROM_PHONE'],
              to=os.environ['TWILIO_TO_PHONE']
          )
          print(f'SMS sent: {message.sid}')
          "
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_PHONE: ${{ secrets.TWILIO_FROM_PHONE }}
          TWILIO_TO_PHONE: ${{ secrets.TWILIO_TO_PHONE }}
