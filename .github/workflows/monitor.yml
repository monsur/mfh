name: URL Attribute Monitor

on:
  schedule:
    - cron: '*/7 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check-url:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run URL checker
        id: checker
        run: |
          python check_url.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Exit code 0: Success (reservations found) - continue
          # Exit code 1: Not found (no reservations) - silent success
          # Exit code 2: Error (network/API issues) - should fail
          if [ $EXIT_CODE -eq 2 ]; then
            echo "❌ Error occurred while checking reservations"
            exit 1
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "ℹ️ No reservations available"
            exit 0
          else
            echo "✅ Reservations found!"
            exit 0
          fi

      - name: Send email notification
        if: steps.checker.outputs.exit_code == '0'
        run: |
          # Build email body
          EMAIL_BODY="Great news! Reservations are available at Mamas Fish House!

          Book now: https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn

          This check ran at: ${{ github.event.repository.updated_at }}

          Don't wait - popular slots fill up fast!"

          # Escape for JSON (replace newlines, quotes, backslashes)
          EMAIL_BODY_JSON=$(echo "$EMAIL_BODY" | jq -Rs .)

          # Send email via SendGrid API and capture response
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer ${{ secrets.SENDGRID_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"personalizations\": [{
                \"to\": [{\"email\": \"${{ secrets.NOTIFICATION_EMAIL }}\"}]
              }],
              \"from\": {\"email\": \"${{ secrets.SENDGRID_FROM_EMAIL }}\"},
              \"subject\": \"🎉 Mamas Fish House - Reservations Available!\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": $EMAIL_BODY_JSON
              }]
            }")

          # Extract HTTP status code and response body
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n-1)

          # Check if successful (202 is SendGrid's success code)
          if [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Email sent successfully!"
          else
            echo "❌ Failed to send email. HTTP Code: $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi

      - name: Send Slack notification
        if: steps.checker.outputs.exit_code == '0'
        run: |
          # Send Slack notification via webhook
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🎉 *Mamas Fish House - Reservations Available!*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🎉 *Mamas Fish House - Reservations Available!*\n\nGreat news! Reservations are available at Mamas Fish House!"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://www.sevenrooms.com/reservations/mamasfishhouserestaurantinn|Book Now>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Check ran at: '"${{ github.event.repository.updated_at }}"'"
                    }
                  ]
                }
              ]
            }')

          # Extract HTTP status code
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n-1)

          # Check if successful (200 is Slack's success code)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Slack notification sent successfully!"
          else
            echo "❌ Failed to send Slack notification. HTTP Code: $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi
